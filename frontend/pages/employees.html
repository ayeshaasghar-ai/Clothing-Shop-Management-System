<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employees | ClothWare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>body{background:transparent;font-family:'Segoe UI',system-ui;padding:20px}.table-responsive{background:white;border-radius:20px;padding:16px}</style>
</head>
<body>
  <div class="d-flex justify-content-between mb-3">
    <h3><i class="fas fa-id-badge"></i> Employee Management</h3>
    <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Add Employee</button>
  </div>
  <div id="alertBox"></div>
  <div class="table-responsive">
    <table class="table table-hover">
      <thead><tr><th>Name</th><th>Role</th><th>Salary</th><th>Actions</th></tr></thead>
      <tbody id="employeesBody"><tr><td colspan="4" class="text-center">Loading...</td></tr></tbody>
    </table>
  </div>
  <div class="modal fade" id="employeeModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header bg-warning"><h5><i class="fas fa-user-tie"></i> Add/Edit Employee</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="empId">
        <input type="text" id="empName" class="form-control mb-2" placeholder="Name">
        <input type="text" id="empRole" class="form-control mb-2" placeholder="Role">
        <input type="number" id="empSalary" class="form-control mb-2" placeholder="Salary" min="0">
      </div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="saveEmployee()">Save</button><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button></div>
    </div></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_BASE='http://localhost:8080/api';
    const getToken=()=>localStorage.getItem('clothware_jwt');
    async function apiFetch(path,opts={}){const headers={'Content-Type':'application/json','Authorization':'Bearer '+getToken()};const res=await fetch(API_BASE+path,{...opts,headers});if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||'Error');}return res.json();}
    let modal;
    window.addEventListener('DOMContentLoaded',()=>{modal=new bootstrap.Modal(document.getElementById('employeeModal'));loadEmployees();});
    function showAlert(msg,type='success'){document.getElementById('alertBox').innerHTML=`<div class="alert alert-${type} alert-dismissible fade show">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;}
    async function loadEmployees(){
      try{
        const data=await apiFetch('/employees');
        document.getElementById('employeesBody').innerHTML=data.length===0?'<tr><td colspan="4" class="text-muted text-center">No employees yet</td></tr>':data.map(e=>`<tr><td>${e.name}</td><td>${e.role||'-'}</td><td>$${Number(e.salary).toFixed(2)}</td><td><button class="btn btn-sm btn-warning me-1" onclick="editEmployee(${e.id},'${(e.name||'').replace(/'/g,"\\'")}','${(e.role||'').replace(/'/g,"\\'")}',${e.salary})"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-danger" onclick="deleteEmployee(${e.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('');
      }catch(e){document.getElementById('employeesBody').innerHTML=`<tr><td colspan="4" class="text-danger">${e.message}</td></tr>`;}
    }
    function openModal(){['empId','empName','empRole','empSalary'].forEach(id=>document.getElementById(id).value='');modal.show();}
    function editEmployee(id,name,role,salary){document.getElementById('empId').value=id;document.getElementById('empName').value=name;document.getElementById('empRole').value=role;document.getElementById('empSalary').value=salary;modal.show();}
    async function saveEmployee(){
      const id=document.getElementById('empId').value;
      const payload={name:document.getElementById('empName').value,role:document.getElementById('empRole').value,salary:parseFloat(document.getElementById('empSalary').value)||0};
      if(!payload.name)return showAlert('Name required','danger');
      try{
        if(id)await apiFetch(`/employees/${id}`,{method:'PUT',body:JSON.stringify(payload)});
        else await apiFetch('/employees',{method:'POST',body:JSON.stringify(payload)});
        modal.hide();showAlert(id?'Employee updated!':'Employee added!');loadEmployees();
      }catch(e){showAlert(e.message,'danger');}
    }
    async function deleteEmployee(id){
      if(!confirm('Delete employee?'))return;
      try{await apiFetch(`/employees/${id}`,{method:'DELETE'});showAlert('Employee deleted');loadEmployees();}catch(e){showAlert(e.message,'danger');}
    }
  </script>
</body>
</html>
