<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products | ClothWare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { background: transparent; font-family: 'Segoe UI', system-ui; padding: 20px; }
    .table-responsive { background: white; border-radius: 20px; padding: 16px; }
  </style>
</head>
<body>
  <div class="d-flex justify-content-between mb-3">
    <h3><i class="fas fa-boxes"></i> Product Management</h3>
    <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Add Product</button>
  </div>
  <div id="alertBox"></div>
  <div class="table-responsive">
    <table class="table table-hover">
      <thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
      <tbody id="productsTableBody"><tr><td colspan="5" class="text-center">Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header bg-primary text-white"><h5><i class="fas fa-box"></i> Add/Edit Product</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="productId">
        <input type="text" id="prodName" class="form-control mb-2" placeholder="Product Name">
        <input type="text" id="prodCategory" class="form-control mb-2" placeholder="Category">
        <input type="number" id="prodPrice" class="form-control mb-2" placeholder="Price" step="0.01" min="0">
        <input type="number" id="prodStock" class="form-control mb-2" placeholder="Stock" min="0">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="saveProductBtn" onclick="saveProduct()">Save</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_BASE = 'http://localhost:8080/api';
    function getToken() { return localStorage.getItem('clothware_jwt'); }
    async function apiFetch(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken(), ...(opts.headers||{}) };
      const res = await fetch(API_BASE + path, { ...opts, headers });
      if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error||'Error'); }
      return res.json();
    }

    let modal;
    window.addEventListener('DOMContentLoaded', () => {
      modal = new bootstrap.Modal(document.getElementById('productModal'));
      loadProducts();
    });

    function showAlert(msg, type='success') {
      document.getElementById('alertBox').innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
    }

    async function loadProducts() {
      try {
        const products = await apiFetch('/products');
        document.getElementById('productsTableBody').innerHTML = products.length === 0
          ? '<tr><td colspan="5" class="text-center text-muted">No products yet</td></tr>'
          : products.map(p => `
            <tr>
              <td>${p.name}</td><td>${p.category||'-'}</td><td>$${Number(p.price).toFixed(2)}</td>
              <td><span class="badge ${p.stock<10?'bg-danger':'bg-secondary'}">${p.stock}</span></td>
              <td>
                <button class="btn btn-sm btn-warning me-1" onclick="editProduct(${p.id},'${escapeQuotes(p.name)}','${escapeQuotes(p.category||'')}',${p.price},${p.stock})"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
              </td>
            </tr>`).join('');
      } catch(e) {
        document.getElementById('productsTableBody').innerHTML = `<tr><td colspan="5" class="text-danger">${e.message}</td></tr>`;
      }
    }

    function escapeQuotes(s) { return (s||'').replace(/'/g,"\\'"); }

    function openModal() {
      document.getElementById('productId').value = '';
      document.getElementById('prodName').value = '';
      document.getElementById('prodCategory').value = '';
      document.getElementById('prodPrice').value = '';
      document.getElementById('prodStock').value = '';
      modal.show();
    }

    function editProduct(id, name, category, price, stock) {
      document.getElementById('productId').value = id;
      document.getElementById('prodName').value = name;
      document.getElementById('prodCategory').value = category;
      document.getElementById('prodPrice').value = price;
      document.getElementById('prodStock').value = stock;
      modal.show();
    }

    async function saveProduct() {
      const id = document.getElementById('productId').value;
      const payload = {
        name: document.getElementById('prodName').value,
        category: document.getElementById('prodCategory').value,
        price: parseFloat(document.getElementById('prodPrice').value) || 0,
        stock: parseInt(document.getElementById('prodStock').value) || 0
      };
      if (!payload.name) return showAlert('Product name is required','danger');
      try {
        if (id) await apiFetch(`/products/${id}`, { method:'PUT', body: JSON.stringify(payload) });
        else await apiFetch('/products', { method:'POST', body: JSON.stringify(payload) });
        modal.hide();
        showAlert(id ? 'Product updated!' : 'Product added!');
        loadProducts();
      } catch(e) { showAlert(e.message,'danger'); }
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      try {
        await apiFetch(`/products/${id}`, { method:'DELETE' });
        showAlert('Product deleted');
        loadProducts();
      } catch(e) { showAlert(e.message,'danger'); }
    }
  </script>
</body>
</html>
