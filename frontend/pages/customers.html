<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customers | ClothWare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>body { background: transparent; font-family: 'Segoe UI', system-ui; padding: 20px; } .table-responsive { background: white; border-radius: 20px; padding: 16px; }</style>
</head>
<body>
  <div class="d-flex justify-content-between mb-3">
    <h3><i class="fas fa-users"></i> Customer Management</h3>
    <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Add Customer</button>
  </div>
  <div id="alertBox"></div>
  <div class="table-responsive">
    <table class="table table-hover">
      <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Actions</th></tr></thead>
      <tbody id="customersBody"><tr><td colspan="4" class="text-center">Loading...</td></tr></tbody>
    </table>
  </div>
  <div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header bg-info text-white"><h5><i class="fas fa-user"></i> Add/Edit Customer</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="custId">
        <input type="text" id="custName" class="form-control mb-2" placeholder="Full Name">
        <input type="email" id="custEmail" class="form-control mb-2" placeholder="Email">
        <input type="text" id="custPhone" class="form-control mb-2" placeholder="Phone">
      </div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="saveCustomer()">Save</button><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button></div>
    </div></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_BASE = 'http://localhost:8080/api';
    const getToken = () => localStorage.getItem('clothware_jwt');
    async function apiFetch(path, opts={}) {
      const headers = {'Content-Type':'application/json','Authorization':'Bearer '+getToken()};
      const res = await fetch(API_BASE+path,{...opts,headers});
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||'Error');}
      return res.json();
    }
    let modal;
    window.addEventListener('DOMContentLoaded',()=>{modal=new bootstrap.Modal(document.getElementById('customerModal'));loadCustomers();});
    function showAlert(msg,type='success'){document.getElementById('alertBox').innerHTML=`<div class="alert alert-${type} alert-dismissible fade show">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;}
    async function loadCustomers(){
      try{
        const data=await apiFetch('/customers');
        document.getElementById('customersBody').innerHTML=data.length===0?'<tr><td colspan="4" class="text-muted text-center">No customers yet</td></tr>':data.map(c=>`<tr><td>${c.name}</td><td>${c.email||'-'}</td><td>${c.phone||'-'}</td><td><button class="btn btn-sm btn-warning me-1" onclick="editCustomer(${c.id},'${(c.name||'').replace(/'/g,"\\'")}','${(c.email||'').replace(/'/g,"\\'")}','${(c.phone||'').replace(/'/g,"\\'")}')"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-danger" onclick="deleteCustomer(${c.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('');
      }catch(e){document.getElementById('customersBody').innerHTML=`<tr><td colspan="4" class="text-danger">${e.message}</td></tr>`;}
    }
    function openModal(){['custId','custName','custEmail','custPhone'].forEach(id=>document.getElementById(id).value='');modal.show();}
    function editCustomer(id,name,email,phone){document.getElementById('custId').value=id;document.getElementById('custName').value=name;document.getElementById('custEmail').value=email;document.getElementById('custPhone').value=phone;modal.show();}
    async function saveCustomer(){
      const id=document.getElementById('custId').value;
      const payload={name:document.getElementById('custName').value,email:document.getElementById('custEmail').value,phone:document.getElementById('custPhone').value};
      if(!payload.name)return showAlert('Name required','danger');
      try{
        if(id)await apiFetch(`/customers/${id}`,{method:'PUT',body:JSON.stringify(payload)});
        else await apiFetch('/customers',{method:'POST',body:JSON.stringify(payload)});
        modal.hide();showAlert(id?'Customer updated!':'Customer added!');loadCustomers();
      }catch(e){showAlert(e.message,'danger');}
    }
    async function deleteCustomer(id){
      if(!confirm('Delete customer?'))return;
      try{await apiFetch(`/customers/${id}`,{method:'DELETE'});showAlert('Customer deleted');loadCustomers();}catch(e){showAlert(e.message,'danger');}
    }
  </script>
</body>
</html>
