<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory | ClothWare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>body{background:transparent;font-family:'Segoe UI',system-ui;padding:20px}.table-responsive{background:white;border-radius:20px;padding:16px}</style>
</head>
<body>
  <h3><i class="fas fa-warehouse"></i> Inventory Management</h3>
  <div class="table-responsive mt-3">
    <table class="table table-bordered">
      <thead><tr><th>Product</th><th>Category</th><th>Current Stock</th><th>Status</th></tr></thead>
      <tbody id="inventoryBody"><tr><td colspan="4" class="text-center">Loading...</td></tr></tbody>
    </table>
  </div>
  <script>
    const API_BASE='http://localhost:8080/api';
    const getToken=()=>localStorage.getItem('clothware_jwt');
    async function loadInventory(){
      try{
        const res=await fetch(API_BASE+'/products',{headers:{'Authorization':'Bearer '+getToken()}});
        const products=await res.json();
        document.getElementById('inventoryBody').innerHTML=products.map(p=>`<tr><td>${p.name}</td><td>${p.category||'-'}</td><td>${p.stock}</td><td><span class="badge ${p.stock<10?'bg-danger':'bg-success'}">${p.stock<10?'Low Stock':'In Stock'}</span></td></tr>`).join('');
      }catch(e){document.getElementById('inventoryBody').innerHTML=`<tr><td colspan="4" class="text-danger">${e.message}</td></tr>`;}
    }
    loadInventory();
  </script>
</body>
</html>
