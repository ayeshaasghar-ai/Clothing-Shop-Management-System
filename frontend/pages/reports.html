<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reports | ClothWare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>body{background:transparent;font-family:'Segoe UI',system-ui;padding:20px}.stat-box{background:white;border-radius:15px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05)}</style>
</head>
<body>
  <h3><i class="fas fa-chart-line"></i> Sales & Stock Reports</h3>
  <div id="reportContent" class="mt-4"><p class="text-muted">Loading report...</p></div>
  <script>
    const API_BASE='http://localhost:8080/api';
    const getToken=()=>localStorage.getItem('clothware_jwt');
    async function loadReport(){
      try{
        const res=await fetch(API_BASE+'/dashboard/report',{headers:{'Authorization':'Bearer '+getToken()}});
        const r=await res.json();
        document.getElementById('reportContent').innerHTML=`
          <div class="row g-3">
            <div class="col-md-4"><div class="stat-box"><h2 class="text-success">$${Number(r.totalRevenue).toFixed(2)}</h2><p class="text-muted">Total Revenue</p></div></div>
            <div class="col-md-4"><div class="stat-box"><h2>${r.totalOrders}</h2><p class="text-muted">Total Orders</p></div></div>
            <div class="col-md-4"><div class="stat-box"><h2 class="text-success">${r.completedOrders}</h2><p class="text-muted">Completed Orders</p></div></div>
            <div class="col-md-4"><div class="stat-box"><h2 class="text-warning">${r.pendingOrders}</h2><p class="text-muted">Pending Orders</p></div></div>
            <div class="col-md-4"><div class="stat-box"><h2>${r.totalProducts}</h2><p class="text-muted">Total Products</p></div></div>
            <div class="col-md-4"><div class="stat-box"><h2 class="text-danger">${r.lowStockItems}</h2><p class="text-muted">Low Stock Items</p></div></div>
            <div class="col-md-4"><div class="stat-box"><h2>${r.totalCustomers}</h2><p class="text-muted">Total Customers</p></div></div>
            <div class="col-md-4"><div class="stat-box"><h2>${r.totalEmployees}</h2><p class="text-muted">Total Employees</p></div></div>
          </div>`;
      }catch(e){document.getElementById('reportContent').innerHTML=`<div class="alert alert-danger">${e.message}</div>`;}
    }
    loadReport();
  </script>
</body>
</html>
