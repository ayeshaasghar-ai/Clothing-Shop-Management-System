# ============================================================
# ClothWare Backend - Application Configuration
# ============================================================

server.port=8080

# ── Database: H2 In-Memory (swap to MySQL below for production)
spring.datasource.url=jdbc:h2:mem:clothwaredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── MySQL (uncomment for production, comment H2 above)
# spring.datasource.url=jdbc:mysql://localhost:3306/clothwaredb?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ── JWT
app.jwt.secret=ClothWare2025SecretKeyForJWTTokenGenerationMustBe256BitsLong!!
app.jwt.expiration=86400000

# ── CORS (allow frontend dev server)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:63342,null

# ── Logging
logging.level.com.clothware=INFO
logging.level.org.springframework.security=WARN
